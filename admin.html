<!doctype html>

<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <title>ボカブキ イベントカレンダー</title>
  <link rel="icon" href="fabicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=RocknRoll+One&family=DotGothic16&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { margin:0; padding:0; background:#111; height:100%; }
    body {
      margin:0; padding:0; font-family:"M PLUS Rounded 1c",system-ui;
      background:#111;
      min-height:100%; min-height:100dvh;
      display:flex; justify-content:center; align-items:flex-start;
    }
    /* スマホ・PC共通: app-shell がスクロールコンテナ */
    #app-shell {
      width:100%; max-width:480px;
      height:100vh; height:100dvh;
      position:relative; background:#FFFBEC;
      overflow-y: auto;
      overflow-x: hidden;
      /* fixed要素の基準をapp-shellに閉じ込める */
      transform: translateZ(0);
      -webkit-overflow-scrolling: touch;
    }
    #app {
      width:100%;
      position:relative;
      min-height:100%;
    }
    button { font-family:inherit; cursor:pointer; }
    input, textarea, select { font-family:inherit; }
    /* スクロールバー: PCのみ細く表示、スマホは非表示 */
    #app-shell::-webkit-scrollbar { width:0; }
    @keyframes vbSpin { to { transform: rotate(360deg); } }
    @keyframes vbBounce { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-14px) scale(1.15)} }
    @keyframes vbFadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .vb-loading-dot { animation: vbBounce 0.7s ease-in-out infinite; }
    .vb-loading-dot:nth-child(2) { animation-delay: 0.12s; }
    .vb-loading-dot:nth-child(3) { animation-delay: 0.24s; }
    .vb-detail-enter { animation: vbFadeIn 0.22s ease-out both; }
    /* カードプレス状態 */
    .vb-card { transition: transform 0.08s, box-shadow 0.08s; }
    .vb-card.pressed { transform: translate(3px,3px) !important; box-shadow: 1px 1px 0 #111 !important; }
    /* ↑ FABをbodyに対してstickyで固定 */
    .vb-fab {
      position: sticky;
      bottom: 18px;
      float: right;
      right: 16px;
      margin-right: 16px;
      z-index: 20;
      pointer-events: auto;
    }
    @media (hover: hover) and (pointer: fine) {
      #app-shell::-webkit-scrollbar { width: 4px; }
      #app-shell::-webkit-scrollbar-track { background: transparent; }
      #app-shell::-webkit-scrollbar-thumb { background: rgba(17,17,17,0.2); border-radius: 2px; }
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <div id="app"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

  <script type="text/babel">
  // DESIGN TOKENS
  const C={turquoise:'#2EC5CE',turquoiseDark:'#1EA3AC',yellow:'#FFD23F',red:'#E63946',orange:'#FF8A1E',paper:'#FFFBEC',ink:'#111111'};
  const B='3px solid #111',BT='4px solid #111',S='4px 4px 0 #111',SB='6px 6px 0 #111',SS='2px 2px 0 #111';
  const pat={
    halftone:(c='#E63946')=>`radial-gradient(circle at 3px 3px,${c} 1.8px,transparent 2px)`,
    stripes:(a,b)=>`repeating-linear-gradient(45deg,${a} 0 6px,${b} 6px 14px)`,
    stripesB:(a,b)=>`repeating-linear-gradient(45deg,${a} 0 10px,${b} 10px 22px)`,
  };

  // STATIC DATA
  const TODAY=new Date(2026,3,19);
  const GENRES_DEFAULT=[
    {id:'game',label:'\u30b2\u30fc\u30e0',color:'#E63946'},
    {id:'anison',label:'\u30a2\u30cb\u30bd\u30f3',color:'#FF8A1E'},
    {id:'classic',label:'\u30af\u30e9\u30b7\u30c3\u30af',color:'#2EC5CE'},
    {id:'remix',label:'\u30ea\u30df\u30c3\u30af\u30b9',color:'#6A3FD9'},
    {id:'allnight',label:'\u30aa\u30fc\u30eb\u30ca\u30a4\u30c8',color:'#111'},
  ];
  const PEOPLE_DEFAULT={
    dragon3:{name:'dragon3',x:'@drag_on_3'},inasu:{name:'\u0438ASU',x:'@rockstar_saihan'},
    nonose:{name:'\u4e43\u3005\u702c',x:'@nono4e'},ayumu:{name:'\u3042\u3086\u3080',x:'@aym_pngn'},
    kaito:{name:'KAITO-P',x:'@kaito_p_dj'},mikumiku:{name:'\u307f\u304f\u307f\u304f',x:'@mikumiku_dj'},
    rin_len:{name:'\u30ea\u30f3\u30ec\u30f3\u5c4b',x:'@rinlen_ya'},negiboshi:{name:'\u30cd\u30ae\u661f',x:'@negiboshi_dj'},
    sakura_b:{name:'\u3055\u304f\u3089B',x:'@sakura_b_dj'},gumiota:{name:'\u30b0\u30df\u30f2\u30bf',x:'@gumiota_dj'},
    luka_luka:{name:'\u30eb\u30ab\u30eb\u30ab\u59c9\u3055\u3093',x:'@lukaluka_n'},eight_en:{name:'\u30a8\u30a4\u30c8\u5712',x:'@eighten_dj'},
    futaba:{name:'\u3075\u305f\u3070',x:'@futaba_dj'},yomogi:{name:'\u3088\u3082\u304e',x:'@yomogi_beats'},
    beeeer:{name:'BEEEER',x:'@beeeer_dj'},kirin_kun:{name:'\u30ad\u30ea\u30f3\u304f\u3093',x:'@kirin_kun_dj'},
    vj_noise:{name:'NOIZU',x:'@noizu_vj'},vj_pop:{name:'\u30dd\u30c3\u30d7\u304f\u3093',x:'@popkun_vj'},
    vj_dot:{name:'DOT8',x:'@dot8_vj'},vj_kiri:{name:'\u304d\u308a\u308a',x:'@kiriri_vj'},
    vj_neko:{name:'\u30cd\u30b3\u76ee\u7dda',x:'@nekomesen_vj'},vj_onigiri:{name:'\u30aa\u30cb\u30ae\u30ea',x:'@onigiri_vj'},
  };
  const STAFF=['dragon3','inasu','nonose','ayumu'];
  const EVENTS_DEFAULT=[
    {id:'e1',date:'2026-04-04',title:'\u30dc\u30ab\u30af\u30e9 Vol.23',genre:'classic',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['luka_luka','sakura_b','beeeer'],vjs:['vj_kiri','vj_pop'],flyer:null},
    {id:'e2',date:'2026-04-11',title:'\u30cd\u30ae\u30de\u30cb\u30a2\uff01',genre:'anison',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['negiboshi','mikumiku','futaba','yomogi'],vjs:['vj_noise','vj_dot'],flyer:null},
    {id:'e3',date:'2026-04-18',title:'\u30dc\u30ab\u30b2\u30fc\u30e0',genre:'game',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['kaito','rin_len','gumiota','eight_en','kirin_kun'],vjs:['vj_dot','vj_neko','vj_onigiri'],flyer:null},
    {id:'e4',date:'2026-04-19',title:'SPRING REMIX PARTY',genre:'remix',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['beeeer','sakura_b','futaba'],vjs:['vj_pop','vj_kiri'],flyer:null},
    {id:'e5',date:'2026-04-25',title:'\u30aa\u30fc\u30eb\u30ca\u30a4\u30c8\u82b1\u898b',genre:'allnight',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['mikumiku','luka_luka','negiboshi','yomogi','kirin_kun','gumiota'],vjs:['vj_noise','vj_onigiri','vj_neko'],flyer:null},
    {id:'e6',date:'2026-05-02',title:'\u30b4\u30fc\u30eb\u30c7\u30f3\u30dc\u30ab\u30af\u30e9',genre:'classic',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['kaito','luka_luka','beeeer','eight_en'],vjs:['vj_kiri'],flyer:null},
    {id:'e7',date:'2026-05-09',title:'\u30dc\u30ab\u30b2\u30fc\u30e0 Vol.12',genre:'game',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['rin_len','negiboshi','gumiota','yomogi'],vjs:['vj_dot','vj_onigiri'],flyer:null},
    {id:'e8',date:'2026-05-16',title:'REMIX NIGHT \u3075\u305f\u3070',genre:'remix',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['futaba','mikumiku','sakura_b'],vjs:['vj_pop'],flyer:null},
    {id:'e9',date:'2026-05-23',title:'\u30a2\u30cb\u30bd\u30f3\u00d7\u30dc\u30ab\u30ed',genre:'anison',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['kirin_kun','negiboshi','beeeer','kaito'],vjs:['vj_neko','vj_noise'],flyer:null},
    {id:'e10',date:'2026-05-30',title:'\u30aa\u30fc\u30eb\u30ca\u30a4\u30c8\u521d\u590f',genre:'allnight',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['luka_luka','yomogi','eight_en','futaba','gumiota','rin_len'],vjs:['vj_dot','vj_kiri','vj_pop'],flyer:null},
    {id:'e11',date:'2026-06-06',title:'\u30dc\u30ab\u30af\u30e9 Vol.24',genre:'classic',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['mikumiku','sakura_b','kaito'],vjs:['vj_kiri','vj_onigiri'],flyer:null},
    {id:'e12',date:'2026-06-13',title:'\u30cd\u30ae\u30cd\u30aeFES',genre:'anison',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['negiboshi','rin_len','kirin_kun','futaba'],vjs:['vj_noise'],flyer:null},
    {id:'e13',date:'2026-06-20',title:'\u30dc\u30ab\u30b2\u30fc\u30e0 Vol.13',genre:'game',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['gumiota','eight_en','yomogi','beeeer'],vjs:['vj_dot','vj_neko'],flyer:null},
    {id:'e14',date:'2026-06-27',title:'SUMMER REMIX',genre:'remix',hashtags:['\u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8'],djs:['luka_luka','futaba','mikumiku','sakura_b'],vjs:['vj_pop','vj_kiri'],flyer:null},
  ];

  // STORAGE
  const ls={
    get:(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}},
    set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  };

  // UTILS
  const WDAYS=['\u6708','\u706b','\u6c34','\u6728','\u91d1','\u571f','\u65e5'];
  function fmtDate(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`;}
  function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
  function sameDay(a,b){return a.toDateString()===b.toDateString();}
  function weekIdx(d){return(d.getDay()+6)%7;}
  function uid(){return'e'+Date.now()+Math.random().toString(36).slice(2,6);}
  function buildMonthCells(year,month){
    const first=new Date(year,month,1),startPad=(first.getDay()+6)%7;
    const daysInMonth=new Date(year,month+1,0).getDate(),cells=[];
    const prevDays=new Date(year,month,0).getDate();
    for(let i=startPad-1;i>=0;i--)cells.push({date:new Date(year,month-1,prevDays-i),outside:true});
    for(let d=1;d<=daysInMonth;d++)cells.push({date:new Date(year,month,d),outside:false});
    while(cells.length<42){const last=cells[cells.length-1].date;const nxt=new Date(last.getFullYear(),last.getMonth(),last.getDate()+1);cells.push({date:nxt,outside:nxt.getMonth()!==month});}
    return cells;
  }

  // SHARED COMPONENTS
  // \u30bf\u30c3\u30d7\u3067\u30d7\u30ec\u30b9\u72b6\u614b\u306b\u306a\u308b\u30ab\u30fc\u30c9\uff08\u9077\u79fb\u5f8c\u306b\u30ea\u30bb\u30c3\u30c8\uff09
  function PressCard({children, onTap, style={}, className=''}){
    const ref=React.useRef();
    const reset=()=>{if(ref.current)ref.current.classList.remove('pressed');};
    const press=()=>{if(ref.current)ref.current.classList.add('pressed');};
    const handleClick=()=>{
      press();
      // \u9077\u79fb\u5f8c\u306b\u30ea\u30bb\u30c3\u30c8\uff08DetailScreen\u304c\u8868\u793a\u3055\u308c\u305f\u3042\u3068\uff09
      setTimeout(()=>{ reset(); onTap(); },120);
    };
    return(
      <div ref={ref} className={`vb-card ${className}`}
        style={style}
        onPointerDown={press}
        onPointerUp={reset}
        onPointerLeave={reset}
        onClick={handleClick}>
        {children}
      </div>
    );
  }

  function StarBurst({size=80,color='#E63946',spikes=20,children,style={}}){
    const pts=[];const cx=size/2,cy=size/2,outer=size/2,inner=size/2*0.86;
    for(let i=0;i<spikes*2;i++){const r=i%2===0?outer:inner;const a=(Math.PI/spikes)*i-Math.PI/2;pts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`);}
    return(<div style={{position:'relative',width:size,height:size,...style}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{position:'absolute',inset:0}}>
        <polygon points={pts.join(' ')} fill={color} stroke="#111" strokeWidth="2.5" strokeLinejoin="round"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'"Reggae One",system-ui',color:'#fff',textShadow:'2px 2px 0 #111',textAlign:'center',lineHeight:1}}>{children}</div>
    </div>);
  }
  function XIcon({size=18}){return(<svg width={size} height={size} viewBox="0 0 24 24" style={{display:'block'}}><rect x="1.5" y="1.5" width="21" height="21" rx="4.5" fill="#111"/><path d="M7 7l10 10M17 7L7 17" stroke="#fff" strokeWidth="2.4" strokeLinecap="round"/></svg>);}
  function VbLogo(){return(<div style={{display:'inline-flex',alignItems:'center',gap:10,fontFamily:'"Reggae One",system-ui',userSelect:'none'}}><div style={{fontSize:22,lineHeight:1,background:C.red,color:'#fff',border:B,borderRadius:10,padding:'6px 10px',boxShadow:SS,transform:'rotate(-3deg)',letterSpacing:1}}>VOCA</div><div style={{fontSize:22,lineHeight:1,background:C.turquoise,color:'#fff',border:B,borderRadius:10,padding:'6px 10px',boxShadow:SS,transform:'rotate(3deg)',letterSpacing:1}}>BUKI</div></div>);}
  function PopBtn({children,onClick,bg=C.yellow,color='#111',size=40,style={}}){
    const ref=React.useRef();
    return(<button ref={ref} onClick={onClick} style={{width:size,height:size,background:bg,color,border:BT,borderRadius:'50%',boxShadow:S,display:'flex',alignItems:'center',justifyContent:'center',padding:0,fontFamily:'"Reggae One",system-ui',fontSize:18,...style}}
      onPointerDown={()=>{if(ref.current){ref.current.style.transform='translate(3px,3px)';ref.current.style.boxShadow='1px 1px 0 #111';}}}
      onPointerUp={()=>{if(ref.current){ref.current.style.transform='';ref.current.style.boxShadow=S;}}}
      onPointerLeave={()=>{if(ref.current){ref.current.style.transform='';ref.current.style.boxShadow=S;}}}
    >{children}</button>);
  }
  function Label({children}){return <div style={{fontFamily:'"DotGothic16",monospace',fontSize:11,color:'#555',marginBottom:3}}>{children}</div>;}
  function SectionHead({children}){return(<div style={{fontFamily:'"Reggae One",system-ui',fontSize:18,background:C.ink,color:'#fff',border:BT,borderRadius:8,padding:'4px 12px',transform:'rotate(-1deg)',boxShadow:SS,display:'inline-block',marginBottom:10}}>{children}</div>);}

  // CALENDAR COMPONENTS
  function ViewSwitcher({view,setView}){
    return(<div style={{display:'inline-flex',border:BT,borderRadius:999,background:'#fff',boxShadow:SS,padding:3,gap:2}}>
      {[{id:'month',label:'\u6708'},{id:'week',label:'\u9031'},{id:'list',label:'\u30ea\u30b9\u30c8'}].map(o=>(
        <button key={o.id} onClick={()=>setView(o.id)} style={{border:'none',background:view===o.id?C.ink:'transparent',color:view===o.id?'#fff':'#111',fontFamily:'"RocknRoll One",system-ui',fontSize:13,padding:'6px 12px',borderRadius:999}}>{o.label}</button>
      ))}
    </div>);
  }
  function GenreFilter({active,setActive,genres}){
    return(<div style={{display:'flex',gap:8,overflowX:'auto',padding:'0 16px 4px',marginLeft:-16,marginRight:-16}}>
      {[{id:'all',label:'ALL',color:'#111'},...genres].map(g=>{const on=active===g.id;return(
        <button key={g.id} onClick={()=>setActive(g.id)} style={{flexShrink:0,border:B,borderRadius:999,padding:'6px 14px',background:on?g.color:'#fff',color:on?'#fff':'#111',boxShadow:on?SS:'none',fontFamily:'"RocknRoll One",system-ui',fontSize:13,transform:on?'translate(-1px,-1px)':'none',whiteSpace:'nowrap'}}># {g.label}</button>
      );})}
    </div>);
  }
  function MonthHeader({year,month,onPrev,onNext,onToday}){
    return(<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',gap:8}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <PopBtn onClick={onPrev} bg={C.yellow} size={38}>\u2039</PopBtn>
        <div style={{fontFamily:'"Reggae One",system-ui',fontSize:28,lineHeight:1,display:'flex',alignItems:'baseline',gap:6}}>
          <span style={{color:C.red}}>{year}</span><span style={{fontSize:16,color:'#111'}}>\u5e74</span>
          <span style={{color:C.turquoiseDark,fontSize:38}}>{month+1}</span><span style={{fontSize:16,color:'#111'}}>\u6708</span>
        </div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={onToday} style={{border:BT,background:C.red,color:'#fff',fontFamily:'"Reggae One",system-ui',fontSize:13,padding:'6px 12px',borderRadius:999,boxShadow:SS}}>\u4eca\u65e5</button>
        <PopBtn onClick={onNext} bg={C.yellow} size={38}>\u203a</PopBtn>
      </div>
    </div>);
  }
  function WeekdayRow(){
    return(<div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,padding:'0 14px',marginTop:6}}>
      {WDAYS.map((w,i)=>{const isSat=i===5,isSun=i===6;return(
        <div key={w} style={{textAlign:'center',fontFamily:'"DotGothic16",monospace',fontSize:13,padding:'4px 0',color:isSun?C.red:isSat?C.turquoiseDark:'#111',background:isSun?'rgba(230,57,70,0.1)':isSat?'rgba(46,197,206,0.12)':'transparent',border:B,borderRadius:8,fontWeight:700}}>{w}</div>
      );})}
    </div>);
  }
  function DayCell({cell,event,isToday,isPast,isFavorite,onClick,dayBg,genres}){
    const d=cell.date,wi=weekIdx(d),isSat=wi===5,isSun=wi===6;
    const genre=event&&genres.find(g=>g.id===event.genre);
    const defaultAccent=isSat?C.turquoise:wi===4?C.red:null;
    const bg=event?(dayBg||(genre?genre.color:C.yellow)):(cell.outside?'rgba(255,255,255,0.4)':(defaultAccent||'#fff'));
    const isBgColored=event||(!!defaultAccent&&!cell.outside);
    return(<button onClick={onClick} disabled={!event}
      style={{position:'relative',aspectRatio:'1/1.15',border:B,borderRadius:8,minWidth:0,background:bg,padding:4,cursor:event?'pointer':'default',opacity:(cell.outside||isPast)?0.55:1,filter:isPast?'saturate(0.4)':'none',boxShadow:event&&!isPast?SS:'none',display:'flex',flexDirection:'column',alignItems:'flex-start',overflow:'visible',textAlign:'left',transform:isToday?'scale(1.02)':'none',outline:isToday?`3px solid ${C.ink}`:'none',outlineOffset:isToday?'2px':0}}>
      {isToday&&<div style={{position:'absolute',top:-10,right:-6,zIndex:10,pointerEvents:'none',fontFamily:'"Reggae One",system-ui',fontSize:16,lineHeight:1,color:'#fff',WebkitTextStroke:'3px #FF3DA5',paintOrder:'stroke fill',transform:'rotate(-8deg)'}}>NOW</div>}
      {isFavorite&&<div style={{position:'absolute',top:2,left:2,fontSize:10}}>\u2b50</div>}
      <div style={{fontFamily:'"Reggae One",system-ui',fontSize:16,lineHeight:1,color:isBgColored?'#fff':(isSun?C.red:isSat?C.turquoiseDark:'#111'),textShadow:isBgColored?'1.5px 1.5px 0 #111':'none',marginTop:1,marginLeft:2}}>{d.getDate()}</div>

      </div>
    </div>);
  }

  // ADMIN


  // \u30a4\u30d9\u30f3\u30c8\u7de8\u96c6\u30ab\u30fc\u30c9\uff08\u30a2\u30b3\u30fc\u30c7\u30a3\u30aa\u30f3\uff09


  // MAIN APP\uff08\u95b2\u89a7\u5c02\u7528\u30fbevents.json\u3092fetch\u3057\u3066\u8868\u793a\uff09
  function App(){
    const[events,setEvents]=React.useState([]);
    const[genres,setGenres]=React.useState(GENRES_DEFAULT);
    const[dayBgMap,setDayBgMap]=React.useState({});
    const[loading,setLoading]=React.useState(true);
    const[fetchErr,setFetchErr]=React.useState(false);
    const[people,setPeople]=React.useState(PEOPLE_DEFAULT);

    // events.json \u3092\u53d6\u5f97\uff08\u30ad\u30e3\u30c3\u30b7\u30e5\u56de\u907f\u4ed8\u304d\uff09
    React.useEffect(()=>{
      fetch('./events.json?t='+Date.now())
        .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
        .then(data=>{
          setEvents(data.events||[]);
          setGenres(data.genres||GENRES_DEFAULT);
          setDayBgMap(data.dayBgMap||{});
          setPeople({...PEOPLE_DEFAULT,...(data.people||{})});
          setLoading(false);
        })
        .catch(()=>{
          // fallback: \u30c7\u30d5\u30a9\u30eb\u30c8\u30c7\u30fc\u30bf\u3067\u8868\u793a
          setEvents(EVENTS_DEFAULT);
          setFetchErr(true);
          setLoading(false);
        });
    },[]);

    const[favorites,setFv_]=React.useState(()=>ls.get('vb_favs',{}));
    const[view,setVw_]=React.useState(()=>ls.get('vb_view','month'));
    const[cursor,setCu_]=React.useState(()=>{const s=ls.get('vb_cursor',null);return s?new Date(s[0],s[1],1):new Date(TODAY.getFullYear(),TODAY.getMonth(),1);});
    const[pendingEvent,setPendingEvent]=React.useState(null);
    const[readyEvent,setReadyEvent]=React.useState(null);
    const timerRef=React.useRef(null);
    const[genre,setGenre]=React.useState('all');
    const lastTap=React.useRef(0);

    const openEvent=(ev)=>{
      const shell=document.getElementById('app-shell');
      if(shell)shell.scrollTop=0;
      setPendingEvent(ev);setReadyEvent(null);
      if(timerRef.current)clearTimeout(timerRef.current);
      timerRef.current=setTimeout(()=>setReadyEvent(ev),400);
    };
    const closeEvent=()=>{setReadyEvent(null);setPendingEvent(null);if(timerRef.current)clearTimeout(timerRef.current);};
    const setFv=v=>{const n=typeof v==='function'?v(favorites):v;setFv_(n);ls.set('vb_favs',n);};
    const setView=v=>{setVw_(v);ls.set('vb_view',v);};
    const setCursor=v=>{const n=typeof v==='function'?v(cursor):v;setCu_(n);ls.set('vb_cursor',[n.getFullYear(),n.getMonth()]);};
    const toggleFav=k=>setFv(f=>{const n={...f};n[k]?delete n[k]:(n[k]=true);return n;});
    const scrollToTop=()=>{const el=document.getElementById('app-shell');if(el)el.scrollTo({top:0,behavior:'smooth'});};

    const filteredEvents=React.useMemo(()=>genre==='all'?events:events.filter(e=>e.genre===genre),[events,genre]);
    const eventByDate=React.useMemo(()=>{const m={};filteredEvents.forEach(e=>{m[e.date]=e;});return m;},[filteredEvents]);
    const cells=React.useMemo(()=>buildMonthCells(cursor.getFullYear(),cursor.getMonth()),[cursor]);
    const weekStart=React.useMemo(()=>{const base=sameDay(cursor,new Date(TODAY.getFullYear(),TODAY.getMonth(),1))?TODAY:new Date(cursor.getFullYear(),cursor.getMonth(),1);const wi=weekIdx(base);return new Date(base.getFullYear(),base.getMonth(),base.getDate()-wi);},[cursor]);

    const onTodayTap=()=>setCursor(new Date(TODAY.getFullYear(),TODAY.getMonth(),1));

    if(loading)return(
      <div style={{position:'fixed',inset:0,background:C.paper,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20}}>
        <div style={{position:'absolute',inset:0,backgroundImage:pat.halftone('rgba(46,197,206,0.18)'),backgroundSize:'8px 8px'}}/>
        <div style={{position:'relative',display:'flex',gap:14}}>
          {['\u1f3b5','\u1f3a7','\u1f3a4'].map((d,i)=>(<div key={i} className="vb-loading-dot" style={{fontSize:32,animationDelay:`${i*0.12}s`}}>{d}</div>))}
        </div>
        <div style={{fontFamily:'"DotGothic16",monospace',fontSize:12,color:'#666',letterSpacing:2,position:'relative'}}>LOADING...</div>
      </div>
    );

    return(<div style={{position:'relative',width:'100%',minHeight:'100vh',minHeight:'100dvh',background:C.paper,fontFamily:'"M PLUS Rounded 1c",system-ui'}}>
      <div style={{position:'fixed',inset:0,pointerEvents:'none',backgroundImage:pat.halftone('rgba(46,197,206,0.14)'),backgroundSize:'8px 8px',zIndex:0,maxWidth:480}}/>
      <div style={{position:'absolute',top:-20,left:-20,width:110,height:110,borderRadius:'50%',background:C.yellow,border:B,opacity:0.85,pointerEvents:'none',zIndex:0}}/>
      <div style={{position:'absolute',top:80,right:-30,width:80,height:80,borderRadius:'50%',background:C.turquoise,border:B,opacity:0.75,pointerEvents:'none',zIndex:0}}/>

      <div style={{position:'relative',zIndex:1,width:'100%',overflowX:'hidden',paddingBottom:80}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px 8px'}}>
          <VbLogo/>
          <div style={{fontFamily:'"DotGothic16",monospace',fontSize:10,background:C.ink,color:'#fff',border:BT,borderRadius:6,padding:'3px 8px',lineHeight:1.2,textAlign:'center'}}>EVENT<br/>CALENDAR</div>
        </div>
        {fetchErr&&<div style={{margin:'0 16px 8px',fontFamily:'"DotGothic16",monospace',fontSize:10,color:'#888',textAlign:'center'}}>\u203b \u30aa\u30d5\u30e9\u30a4\u30f3\u306e\u305f\u3081\u4eee\u30c7\u30fc\u30bf\u3092\u8868\u793a\u3057\u3066\u3044\u307e\u3059</div>}
        <div style={{margin:'0 16px 14px',position:'relative',background:C.red,color:'#fff',border:BT,borderRadius:10,padding:'8px 14px',boxShadow:S,display:'flex',alignItems:'center',justifyContent:'space-between',overflow:'hidden'}}>
          <div style={{position:'absolute',inset:0,opacity:0.25,backgroundImage:pat.stripes('rgba(255,255,255,0.5)','transparent')}}/>
          <div style={{fontFamily:'"Reggae One",system-ui',fontSize:16,position:'relative',letterSpacing:1}}>\u516c\u958b\u30a4\u30d9\u30f3\u30c8\u30ab\u30ec\u30f3\u30c0\u30fc</div>
          <div style={{fontFamily:'"DotGothic16",monospace',fontSize:9,background:'#fff',color:C.red,border:'2px solid #111',borderRadius:4,padding:'2px 6px',position:'relative',fontWeight:700,whiteSpace:'nowrap'}}># \u30dc\u30ab\u30d6\u30ad\u30a4\u30d9\u30f3\u30c8 \u81ea\u52d5\u9023\u643a</div>
        </div>

        {view==='month'&&<MonthHeader year={cursor.getFullYear()} month={cursor.getMonth()} onPrev={()=>setCursor(c=>new Date(c.getFullYear(),c.getMonth()-1,1))} onNext={()=>setCursor(c=>new Date(c.getFullYear(),c.getMonth()+1,1))} onToday={onTodayTap}/>}
        {view==='week'&&(<div style={{padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontFamily:'"Reggae One",system-ui',fontSize:20}}>{weekStart.getMonth()+1}\u6708 <span style={{fontSize:12,color:'#555'}}>{weekStart.getDate()}\u65e5\u301c</span></div>
          <button onClick={onTodayTap} style={{border:BT,background:C.red,color:'#fff',fontFamily:'"Reggae One",system-ui',fontSize:13,padding:'6px 12px',borderRadius:999,boxShadow:SS}}>\u4eca\u65e5</button>
        </div>)}
        {view==='list'&&<div style={{padding:'0 16px 8px'}}><div style={{fontFamily:'"Reggae One",system-ui',fontSize:20}}>\u30a4\u30d9\u30f3\u30c8\u4e00\u89a7</div></div>}

        <div style={{padding:'10px 16px 10px',display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <ViewSwitcher view={view} setView={setView}/>
          <div style={{fontFamily:'"DotGothic16",monospace',fontSize:10,color:'#666'}}>{filteredEvents.length} events</div>
        </div>
        <div style={{padding:'0 16px 10px'}}><GenreFilter active={genre} setActive={setGenre} genres={genres}/></div>
        {view==='month'&&<WeekdayRow/>}
        {view==='month'&&(<><MonthGrid cells={cells} eventByDate={eventByDate} onPick={openEvent} favorites={favorites} dayBgMap={dayBgMap} genres={genres}/><UpcomingList events={filteredEvents} onPick={openEvent} favorites={favorites} genres={genres}/></>)}
        {view==='week'&&<div style={{paddingTop:10}}><WeekView start={weekStart} eventByDate={eventByDate} onPick={openEvent} favorites={favorites} genres={genres}/></div>}
        {view==='list'&&<ListView events={filteredEvents} onPick={openEvent} favorites={favorites} genres={genres}/>}
        <div style={{textAlign:'center',padding:'14px 16px 30px',fontFamily:'"DotGothic16",monospace',fontSize:10,color:'#666'}}>\u30dc\u30ab\u30ed\u5c02\u9580\u30ca\u30a4\u30c8\u30af\u30e9\u30d6 \u30dc\u30ab\u30d6\u30ad<br/>\u6b4c\u821e\u4f0e\u753a 2-45-2 Gest32\u30d3\u30eb 5F / \u6bce\u65e5\u55b6\u696d 24:00-5:00</div>
      </div>

      {!pendingEvent&&<div className="vb-fab"><button onClick={scrollToTop} style={{background:C.yellow,color:'#111',border:BT,borderRadius:'50%',width:52,height:52,boxShadow:SB,fontFamily:'"Reggae One",system-ui',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>\u2191</button></div>}
      {pendingEvent&&!readyEvent&&<LoadingScreen event={pendingEvent} genres={genres}/>}
      {readyEvent&&<DetailScreen event={readyEvent} onBack={closeEvent} favorites={favorites} toggleFav={toggleFav} people={people} genres={genres}/>}
    </div>);
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
  </script>

</body>
</html>
