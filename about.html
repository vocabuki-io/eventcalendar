<html lang="ja">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { margin:0; padding:0; background:#111; height:100%; }
    body {
      margin:0; padding:0;
      font-family:"M PLUS Rounded 1c",system-ui;
      background:#111;
      min-height:100%; min-height:100dvh;
      display:flex; justify-content:center; align-items:flex-start;
    }
    #app-shell {
      width:100%; max-width:480px;
      height:100vh; height:100dvh;
      position:relative; background:#FFFBEC;
      overflow-y:auto; overflow-x:hidden;
      transform:translateZ(0);
      -webkit-overflow-scrolling:touch;
    }
    button { font-family:inherit; cursor:pointer; }
    input, textarea, select { font-family:inherit; }
    #app-shell::-webkit-scrollbar { width:0; }
    @media (hover:hover) and (pointer:fine) {
      #app-shell::-webkit-scrollbar { width:4px; }
      #app-shell::-webkit-scrollbar-track { background:transparent; }
      #app-shell::-webkit-scrollbar-thumb { background:rgba(17,17,17,0.2); border-radius:2px; }
    }
    @keyframes vbFadeIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes vbSlideIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
    @keyframes vbPop { 0%{transform:scale(0.88)} 60%{transform:scale(1.05)} 100%{transform:scale(1)} }
    @keyframes vbBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes vbSpin { to{transform:rotate(360deg)} }
    .fade-in { animation:vbFadeIn 0.3s ease-out both; }
    .slide-in { animation:vbSlideIn 0.25s ease-out both; }
    .pop-in { animation:vbPop 0.35s ease-out both; }
    .quiz-opt { transition:all 0.12s; }
    .quiz-opt:active { transform:translate(2px,2px) !important; box-shadow:1px 1px 0 #111 !important; }
  </style>
</head>
<body>
<div id="app-shell">
  <div id="app"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel">

  stripes:(a,b)=>`repeating-linear-gradient(45deg,${a} 0 6px,${b} 6px 14px)`,

// スコアに基づくイベント判定
function judgeEvent(answers) {
  const scores = { game: 0, anison: 0, classic: 0, remix: 0, allnight: 0 };
  // Q1 初心者 → classic, ベテラン → allnight
  if (answers[0] === 0) scores.classic += 2;
  if (answers[0] === 3) scores.allnight += 2;
  // Q2 ジャンル
  if (answers[1] === 0) scores.anison += 3;
  if (answers[1] === 1) scores.game += 3;
  if (answers[1] === 2) scores.remix += 3;
  if (answers[1] === 3) { scores.anison += 1; scores.game += 1; scores.classic += 1; }
  // Q3 深夜
  if (answers[2] === 0) scores.allnight += 3;
  if (answers[2] === 1) scores.remix += 2;
  if (answers[2] === 2) scores.classic += 2;
  // Q4 キャラ
  if (answers[3] === 0) scores.classic += 2;
  if (answers[3] === 1) scores.anison += 2;
  if (answers[3] === 2) scores.remix += 1;
  if (answers[3] === 3) scores.allnight += 1;
  // Q5 目的
  if (answers[4] === 0) scores.game += 2;
  if (answers[4] === 2) scores.anison += 2;
  if (answers[4] === 3) scores.remix += 2;
  // Q6 飲み
  if (answers[5] === 0) scores.allnight += 2;
  if (answers[5] === 2) scores.classic += 1;
  // Q7 長さ
  if (answers[6] === 0) scores.allnight += 3;
  if (answers[6] === 1) scores.remix += 1;
  if (answers[6] === 2) scores.classic += 1;

  const best = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const results = {
    game: {
      label:'ボカゲーム',
      color: C.red,
      emoji:'🎮',
      desc:'ゲーム音楽を中心に盛り上がるボカゲームがぴったり！ノリのいい選曲でフロアは最高潮。ゲーム好きが集まる熱い夜！',
      tags:['#ゲーム音楽','#ボカロ','#ハイテンション'],
    },
    anison: {
      label:'ネギマニア',
      color: C.orange,
      emoji:'🎤',
      desc:'アニソン＆ボカロ曲たっぷり！知ってる曲で盛り上がりたいあなたに最適。一緒に口ずさみながら踊ろう！',
      tags:['#アニソン','#ボカロ','#みんなで歌う'],
    },
    classic: {
      label:'ボカクラ',
      color: C.turquoise,
      emoji:'💎',
      desc:'ボカクラ定番の王道イベント。はじめての方も常連さんも楽しめる安心の一夜。落ち着いた雰囲気でじっくり楽しみたいあなたへ。',
      tags:['#定番','#はじめてOK','#王道ボカロ'],
    },
    remix: {
      label:'REMIX NIGHT',
      color: C.purple,
      emoji:'🎛️',
      desc:'クラブ系リミックスで踊りたいあなたにドンピシャ！DJのプレイに身を委ねて朝まで体を動かそう。',
      tags:['#リミックス','#クラブ系','#踊る'],
    },
    allnight: {
      label:'オールナイト',
      color: C.ink,
      emoji:'🌙',
      desc:'オールナイトの長丁場があなたのフィールド！夜明けまで踊り続けるガチ勢と一緒に朝を迎えよう。体力と覚悟は準備OK？',
      tags:['#朝まで','#ガチ勢','#オールナイト'],
    },
  };
  return results[best];
}

// ── QUIZ ────────────────────────────────────────────────────────────────────
function QuizSection() {
  const [step, setStep] = React.useState(0); // 0=intro, 1-7=questions, 8=result
  const [answers, setAnswers] = React.useState([]);
  const [selected, setSelected] = React.useState(null);
  const [animKey, setAnimKey] = React.useState(0);

  const totalQ = QUIZ_QUESTIONS.length;
  const isIntro = step === 0;
  const isResult = step > totalQ;
  const qIdx = step - 1;

  const choose = (optIdx) => {
    setSelected(optIdx);
    setTimeout(() => {
      const newAnswers = [...answers, optIdx];
      setAnswers(newAnswers);
      setSelected(null);
      setAnimKey(k=>k+1);
      setStep(s => s + 1);
    }, 320);
  };

  const restart = () => {
    setStep(0); setAnswers([]); setSelected(null); setAnimKey(k=>k+1);
  };

  const result = isResult ? judgeEvent(answers) : null;

  const optColors = [C.red, C.orange, C.turquoise, C.purple];
  const optBgLight = ['rgba(230,57,70,0.10)','rgba(255,138,30,0.10)','rgba(46,197,206,0.10)','rgba(106,63,217,0.10)'];

  return (
    <div className="fade-in">
      {isIntro && (
        <div key="intro" style={{display:'flex',flexDirection:'column',gap:16}}>
          <Card style={{textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:14,padding:'28px 16px'}}>
            <div style={{fontSize:48,animation:'vbBounce 1.2s ease-in-out infinite'}}>🎯</div>
            <div style={{fontFamily:'"Reggae One",system-ui',fontSize:22,color:C.turquoise,lineHeight:1.2}}>イベント診断</div>
            <div style={{fontFamily:'"DotGothic16",monospace',fontSize:12,color:'#555',lineHeight:2}}>
              {totalQ}問に答えて<br/>
              あなたにおすすめの<br/>
              ボカブキイベントを診断！
            </div>
            <button onClick={()=>{ setStep(1); setAnimKey(k=>k+1); }}
              style={{marginTop:8,background:C.red,color:'#fff',border:BT,borderRadius:12,padding:'14px 32px',fontFamily:'"Reggae One",system-ui',fontSize:18,boxShadow:S}}>
              診断スタート！
            </button>
          </Card>
        </div>
      )}

      {!isIntro && !isResult && (
        <div key={`q-${animKey}`} className="fade-in" style={{display:'flex',flexDirection:'column',gap:14}}>
          {/* progress */}
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{fontFamily:'"DotGothic16",monospace',fontSize:11,color:'#888',whiteSpace:'nowrap'}}>Q{step} / {totalQ}</div>
            <div style={{flex:1,height:8,background:'#e8e0cc',border:B,borderRadius:6,overflow:'hidden'}}>
              <div style={{height:'100%',background:C.red,width:`${(step/totalQ)*100}%`,transition:'width 0.3s',borderRadius:4}}/>
            </div>
          </div>
          {/* question */}
          <Card style={{textAlign:'center',padding:'20px 16px'}}>
            <div style={{fontFamily:'"DotGothic16",monospace',fontSize:11,color:C.red,marginBottom:8,letterSpacing:1}}>QUESTION {step}</div>
            <div style={{fontFamily:'"RocknRoll One",system-ui',fontSize:18,lineHeight:1.5,color:C.ink}}>
              {QUIZ_QUESTIONS[qIdx].q}
            </div>
          </Card>
          {/* options */}
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {QUIZ_QUESTIONS[qIdx].opts.map((opt,i)=>(
              <button key={i} className="quiz-opt" onClick={()=>choose(i)}
                style={{
                  display:'flex',alignItems:'center',gap:14,
                  background: selected===i ? optColors[i] : '#fff',
                  color: selected===i ? '#fff' : '#111',
                  border: BT,
                  borderRadius:12,
                  padding:'14px 16px',
                  textAlign:'left',
                  width:'100%',
                  boxShadow: selected===i ? '2px 2px 0 #111' : S,
                  transform: selected===i ? 'translate(2px,2px)' : 'none',
                  fontFamily:'"RocknRoll One",system-ui',
                  fontSize:14,
                  transition:'all 0.12s',
                }}>
                <div style={{width:28,height:28,flexShrink:0,background:selected===i?'rgba(255,255,255,0.25)':optBgLight[i],border:B,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'"Reggae One"',fontSize:14,color:selected===i?'#fff':optColors[i],fontWeight:700}}>
                  {String.fromCharCode(65+i)}
                </div>
                {opt}
              </button>
            ))}
          </div>
        </div>
      )}

      {isResult && result && (
        <div key={`result-${animKey}`} className="pop-in" style={{display:'flex',flexDirection:'column',gap:16}}>
          {/* result card */}
          <div style={{background:result.color,border:BT,borderRadius:16,padding:'24px 20px',boxShadow:SB,textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:12,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',inset:0,opacity:0.15,backgroundImage:pat.halftone('rgba(255,255,255,0.4)'),backgroundSize:'6px 6px'}}/>
            <div style={{position:'absolute',top:-20,right:-20,width:80,height:80,borderRadius:'50%',background:'rgba(255,255,255,0.1)',border:'3px solid rgba(255,255,255,0.2)'}}/>
            <div style={{position:'relative',fontSize:52}}>{result.emoji}</div>
            <div style={{position:'relative',fontFamily:'"DotGothic16",monospace',fontSize:11,color:'rgba(255,255,255,0.8)',letterSpacing:2}}>あなたにおすすめのイベントは</div>
            <div style={{position:'relative',fontFamily:'"Reggae One",system-ui',fontSize:30,color:'#fff',textShadow:'3px 3px 0 rgba(0,0,0,0.35)',lineHeight:1.1}}>
              {result.label}
            </div>
            <div style={{position:'relative',fontFamily:'"DotGothic16",monospace',fontSize:11,color:'#fff',lineHeight:1.9,textAlign:'center',maxWidth:260}}>
              {result.desc}
            </div>
            <div style={{position:'relative',display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center',marginTop:4}}>
              {result.tags.map((t,i)=>(
                <span key={i} style={{fontFamily:'"DotGothic16",monospace',fontSize:10,background:'rgba(255,255,255,0.2)',color:'#fff',border:'2px solid rgba(255,255,255,0.5)',borderRadius:6,padding:'2px 8px'}}>{t}</span>
              ))}
            </div>
          </div>
          {/* actions */}
          <Card style={{textAlign:'center',display:'flex',flexDirection:'column',gap:12,alignItems:'center',padding:'20px 16px'}}>
            <div style={{fontFamily:'"DotGothic16",monospace',fontSize:12,color:'#666',lineHeight:1.8}}>
              カレンダーで次回の<br/>
              <span style={{color:result.color,fontWeight:700}}>{result.label}</span> をチェックしよう！
            </div>
            <a href="./index.html" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:C.turquoise,color:'#fff',border:BT,borderRadius:12,padding:'13px 24px',textDecoration:'none',fontFamily:'"Reggae One",system-ui',fontSize:15,boxShadow:SS,width:'100%'}}>
              📅 イベントカレンダーへ
            </a>
            <button onClick={restart}
              style={{background:'#fff',color:'#111',border:BT,borderRadius:12,padding:'12px 24px',fontFamily:'"RocknRoll One",system-ui',fontSize:14,boxShadow:SS,width:'100%'}}>
              🔄 もう一度診断する
            </button>
          </Card>
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ────────────────────────────────────────────────────────────────
const MENUS = [
  {id:'access', icon:'📍', label:'アクセス', color:C.turquoise},
  {id:'qa',     icon:'❓', label:'Q&A',      color:C.orange},
  {id:'drink',  icon:'🍺', label:'ドリンクメニュー', color:C.red},
  {id:'sns',    icon:'🌐', label:'公式SNS・スタッフ', color:C.purple},
  {id:'quiz',   icon:'🎯', label:'イベント診断', color:C.ink},
];

function App() {
  const [section, setSection] = React.useState(null);
  const [animKey, setAnimKey] = React.useState(0);
  const shell = React.useRef(null);

  const goSection = (id) => {
    if (shell.current) shell.current.scrollTop = 0;
    setSection(id);
    setAnimKey(k => k+1);
  };
  const goBack = () => {
    if (shell.current) shell.current.scrollTop = 0;
    setSection(null);
  };

  const activeMenu = MENUS.find(m=>m.id===section);

  return (
    <div ref={shell} id="app-shell-inner" style={{position:'relative',width:'100%',minHeight:'100%',fontFamily:'"M PLUS Rounded 1c",system-ui'}}>
      {/* BG pattern */}
      <div style={{position:'fixed',inset:0,pointerEvents:'none',backgroundImage:pat.halftone('rgba(46,197,206,0.12)'),backgroundSize:'8px 8px',zIndex:0,maxWidth:480}}/>
      {/* deco circles */}
      <div style={{position:'fixed',top:-20,left:-20,width:110,height:110,borderRadius:'50%',background:C.yellow,border:B,opacity:0.8,pointerEvents:'none',zIndex:0}}/>
      <div style={{position:'fixed',top:80,right:-30,width:80,height:80,borderRadius:'50%',background:C.turquoise,border:B,opacity:0.7,pointerEvents:'none',zIndex:0}}/>

      <div style={{position:'relative',zIndex:1,paddingBottom:40}}>
        {/* Header */}
        <div style={{position:'sticky',top:0,zIndex:10,padding:'12px 16px 10px',background:`linear-gradient(to bottom,${C.paper} 80%,transparent)`,display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
          {section
            ? <button onClick={goBack}
                style={{display:'flex',alignItems:'center',gap:6,background:'#fff',border:BT,borderRadius:999,padding:'8px 14px 8px 12px',boxShadow:S,fontFamily:'"Reggae One",system-ui',fontSize:14}}>
                <span style={{fontSize:18}}>←</span> 戻る
              </button>
            : <VbLogo/>
          }
          {section
            ? <div style={{fontFamily:'"Reggae One",system-ui',fontSize:16,color:activeMenu?.color||C.ink}}>
                {activeMenu?.icon} {activeMenu?.label}
              </div>
            : <a href="./index.html"
                style={{display:'inline-flex',alignItems:'center',gap:6,border:BT,background:C.yellow,color:'#111',fontFamily:'"Reggae One",system-ui',fontSize:12,padding:'7px 12px',borderRadius:8,boxShadow:SS,textDecoration:'none'}}>
                📅 カレンダー
              </a>
          }
        </div>

        <div style={{padding:'0 16px 20px'}}>
          {/* HOME */}
          {!section && (
            <div key="home" className="fade-in">
              {/* Hero */}
              <div style={{background:C.ink,color:'#fff',border:BT,borderRadius:16,padding:'20px',boxShadow:SB,marginBottom:20,textAlign:'center',position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',inset:0,opacity:0.2,backgroundImage:pat.stripes('rgba(255,255,255,0.15)','transparent')}}/>
                <div style={{position:'absolute',top:-18,right:-18,width:70,height:70,borderRadius:'50%',background:C.yellow,border:B,opacity:0.7}}/>
                <div style={{position:'absolute',bottom:-22,left:-22,width:80,height:80,borderRadius:'50%',background:C.turquoise,border:B,opacity:0.6}}/>
                <div style={{position:'relative',fontFamily:'"Reggae One",system-ui',fontSize:26,letterSpacing:3,marginBottom:6}}>VOCABUKI</div>
                <div style={{position:'relative',fontFamily:'"DotGothic16",monospace',fontSize:11,color:'#aaa',lineHeight:2}}>
                  ボカロ専門ナイトクラブ<br/>
                  新宿区歌舞伎町 2-45-2 gest32ビル 5F<br/>
                  OPEN 24:00 ── CLOSE 5:00
                </div>
              </div>
              {/* Menu grid */}
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {MENUS.map((m,i) => (
                  <button key={m.id} onClick={()=>goSection(m.id)}
                    style={{
                      display:'flex',alignItems:'center',gap:16,
                      background:'#fff',border:BT,borderRadius:14,
                      padding:'16px 18px',boxShadow:S,
                      textAlign:'left',cursor:'pointer',width:'100%',
                      animationDelay:`${i*0.06}s`,
                    }}
                    className="fade-in">
                    <div style={{width:48,height:48,flexShrink:0,background:m.color,border:BT,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,boxShadow:SS}}>
                      {m.icon}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:'"RocknRoll One",system-ui',fontSize:16,color:C.ink}}>{m.label}</div>
                    </div>
                    <div style={{fontFamily:'"Reggae One",system-ui',fontSize:22,color:'#ccc'}}>›</div>
                  </button>
                ))}
              </div>
              <div style={{textAlign:'center',padding:'24px 0 10px',fontFamily:'"DotGothic16",monospace',fontSize:10,color:'#888',lineHeight:1.8}}>
                ボカロ専門ナイトクラブ ボカブキ<br/>
                新宿区歌舞伎町 2-45-2 gest32ビル 5F
              </div>
            </div>
          )}

          {/* SECTION CONTENT */}
          {section && (
            <div key={`section-${animKey}`}>
              {section === 'access' && <AccessSection/>}
              {section === 'qa'     && <QASection/>}
              {section === 'drink'  && <DrinkSection/>}
              {section === 'sns'    && <SNSSection/>}
              {section === 'quiz'   && <QuizSection/>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// app-shell を scroll コンテナとして使う
const appShell = document.getElementById('app-shell');
appShell.style.overflowY = 'auto';

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>

</body>
</html>
